<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting Data Source | JABRAN &amp; CO.</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  :root{ --bg:#0B0F14; --bg-alt:#111820; --bg-deep:#08111C; --gold:#C6A55A;
         --gold-light:#E4C98A; --cream:#F5F3EF; --muted:#9C9690; --line:rgba(198,165,90,0.22); }
  body{background:var(--bg); color:var(--cream); font-family:'Inter',sans-serif; font-weight:300; line-height:1.7;}
  .ob{max-width:560px; margin:70px auto; padding:0 18px; text-align:center;}
  .ob .eyebrow{font-size:11px; letter-spacing:0.26em; text-transform:uppercase; color:var(--gold); font-weight:500;}
  .ob h1{font-family:'Playfair Display',serif; font-size:24px; font-weight:600; margin:8px 0 6px;}
  .ob p{font-size:14px; color:var(--muted); margin:0 0 8px;}
  .ob .card{border:1px solid var(--line); background:var(--bg-alt); padding:20px 18px; margin-top:20px; text-align:left;}
  .ob .row{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.04em; color:var(--muted); line-height:1.9; word-break:break-word;}
  .ob .ok{color:#7fc8a9;} .ob .bad{color:#e57368;} .ob .warn{color:var(--gold-light);}
  .btn{display:inline-block; background:var(--gold); color:#0a0a0b; border:none; padding:12px 20px;
       font-size:12px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; font-weight:500;
       border-radius:2px; text-decoration:none; margin:16px 6px 0 0;}
  .btn.ghost{background:transparent; color:var(--gold-light); border:1px solid var(--line);}
  .spin{width:24px;height:24px;border:2px solid rgba(198,165,90,0.25);border-top-color:var(--gold);
        border-radius:50%;animation:sp 0.9s linear infinite;margin:14px auto;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .stamp{font-family:'IBM Plex Mono',monospace; font-size:9px; color:#5d5a56; margin-top:14px; letter-spacing:0.1em;}
</style>
</head>
<body>
<div class="ob">
  <img src="logo-full.png" alt="JABRAN &amp; CO." style="width:120px; max-width:50%; height:auto; margin-bottom:18px;">
  <div class="eyebrow">Data Sources</div>
  <h1 id="ob-title">Completing the connection…</h1>
  <p id="ob-sub">Verifying the authorisation and storing the credential server-side.</p>
  <div class="spin" id="ob-spin"></div>
  <div class="card">
    <div class="row" id="ob-log"></div>
    <div id="ob-actions"></div>
  </div>
  <div class="stamp">BUILD 2026-07-16.4-oauth-callback</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
/* ============================================================================
   OAuth callback landing page · BUILD 2026-07-16.4

   The provider returns the browser here with ?code & ?state. This page never
   sees a client secret: it forwards code + state to the analytics-oauth Edge
   Function using the staff member's own Supabase session, and the exchange
   happens server-side. The PROVIDER IS NOT read from the browser — the server
   derives it from the one-use state row, because the provider may return us in
   a different tab where sessionStorage would be empty.

   THIS BUILD CANNOT FAIL SILENTLY. The previous build had no try/catch around
   its handler, so any throw (e.g. the Supabase CDN blocked, leaving `sb`
   undefined) left the spinner turning forever with no message — which is
   exactly what happened. Every failure path is now printed on screen.
============================================================================ */
(function () {
  var logEl, actEl, titleEl, subEl, spin, settled = false;

  function el(id) { return document.getElementById(id); }
  function line(text, cls) {
    if (!logEl) return;
    var d = document.createElement('div');
    if (cls) d.className = cls;
    d.textContent = text;
    logEl.appendChild(d);
  }
  function done(ok, title, sub) {
    settled = true;
    if (spin) spin.style.display = 'none';
    if (titleEl) titleEl.textContent = title;
    if (subEl) subEl.textContent = sub;
    if (actEl) {
      actEl.innerHTML = '<a class="btn" href="crm-analytics.html">Back to Data Sources</a>' +
        (ok ? '' : '<a class="btn ghost" href="crm.html">CRM Dashboard</a>');
    }
  }

  /* ---- nothing may escape unseen ---- */
  window.addEventListener('error', function (e) {
    line('Script error: ' + (e && e.message ? e.message : 'unknown'), 'bad');
    if (!settled) done(false, 'Connection failed', 'A script error stopped the exchange. Details above.');
  });
  window.addEventListener('unhandledrejection', function (e) {
    var r = e && e.reason;
    line('Unhandled rejection: ' + String(r && r.message ? r.message : r), 'bad');
    if (!settled) done(false, 'Connection failed', 'A request failed. Details above.');
  });

  function boot() {
    logEl = el('ob-log'); actEl = el('ob-actions');
    titleEl = el('ob-title'); subEl = el('ob-sub'); spin = el('ob-spin');

    setTimeout(function () {
      if (settled) return;
      line('Timed out after 25 seconds with no answer.', 'bad');
      line('Most likely the Supabase library or the Edge Function could not be reached.', '');
      done(false, 'Connection timed out', 'Nothing was stored. Try again from Data Sources.');
    }, 25000);

    run();
  }

  async function run() {
    try {
      if (location.hostname === 'www.jabranandco.com') {
        location.replace('https://jabranandco.com' + location.pathname + location.search);
        return;
      }

      var q = new URLSearchParams(location.search);
      var code = q.get('code');
      var state = q.get('state');
      var err = q.get('error') || q.get('error_description') || q.get('error_reason');

      line('Page loaded. Query keys: ' + (Array.from(q.keys()).join(', ') || '(none)'), '');

      if (err) {
        line('Provider returned an error: ' + String(err).slice(0, 200), 'bad');
        done(false, 'Authorisation cancelled', 'The provider did not grant access. Nothing was stored.');
        return;
      }
      if (!code || !state) {
        line('No authorisation code or state in the URL.', 'bad');
        line('This page is only reached by returning from Google, Meta or LinkedIn.', '');
        done(false, 'Nothing to complete', 'Start the connection from the Data Sources tab.');
        return;
      }
      line('Authorisation code received.', 'ok');
      line('State present — the server validates it once and identifies the source.', '');

      if (typeof sb === 'undefined' || !sb || !sb.auth) {
        line('The Supabase client did not load on this page.', 'bad');
        line('supabase-client.js or the CDN script was blocked or is missing.', '');
        done(false, 'Cannot complete', 'The page could not reach Supabase. Check the network, then retry.');
        return;
      }
      line('Supabase client ready (build ' + (window.JCO_BUILD || 'unknown') + ').', 'ok');

      var s;
      try { s = await sb.auth.getSession(); }
      catch (e) {
        line('getSession failed: ' + String(e && e.message ? e.message : e), 'bad');
        done(false, 'Cannot complete', 'Your session could not be read. Sign in again, then retry.');
        return;
      }
      if (!s || !s.data || !s.data.session) {
        line('No staff session in this browser.', 'bad');
        line('The provider may have returned you in a different tab or browser profile.', '');
        done(false, 'Sign in required',
          'Open the CRM, sign in, then start the connection again from Data Sources.');
        return;
      }
      line('Staff session verified — forwarding to the server.', 'ok');

      var r;
      try {
        r = await sb.functions.invoke('analytics-oauth',
          { body: { action: 'exchange', code: code, state: state } });
      } catch (e) {
        line('Could not reach the analytics-oauth function: ' + String(e && e.message ? e.message : e), 'bad');
        done(false, 'Connection failed', 'The Edge Function did not respond. Is it deployed with JWT ON?');
        return;
      }

      if (r.error) {
        var msg = r.error.message || 'unknown error';
        try {
          if (r.error.context && r.error.context.json) {
            var j = await r.error.context.json();
            if (j && j.error) msg = j.error;
          }
        } catch (e2) {}
        line('Exchange rejected: ' + msg, 'bad');
        done(false, 'Connection failed', 'No credential was stored. The reason is shown above.');
        return;
      }
      if (r.data && r.data.error) {
        line('Exchange rejected: ' + r.data.error, 'bad');
        done(false, 'Connection failed', 'No credential was stored.');
        return;
      }

      line('Source: ' + ((r.data && r.data.provider) || 'unknown'), 'ok');
      line('Scopes granted: ' + (((r.data && r.data.scopes) || []).join(', ') || '(none reported)'), '');
      line('Token exchanged and encrypted server-side. Never readable from a browser.', 'ok');
      try { sessionStorage.setItem('jco_oauth_done', '1'); } catch (e) {}
      try { history.replaceState({}, '', 'analytics-oauth.html'); } catch (e) {}
      done(true, 'Connected', 'The source is live. Open Data Sources and tap Sync now.');
    } catch (e) {
      line('Unexpected failure: ' + String(e && e.message ? e.message : e), 'bad');
      done(false, 'Connection failed', 'Nothing was stored. Details above.');
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
</body>
</html>
