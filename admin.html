<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Jabran &amp; Co</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .admin-wrap{max-width:900px; margin:0 auto; padding:140px 32px 80px;}
  .admin-tabs{display:flex; gap:1px; background:var(--line); border:1px solid var(--line); margin-bottom:32px;}
  .admin-tab{flex:1; text-align:center; padding:14px; background:var(--bg-alt); cursor:pointer; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted);}
  .admin-tab.active{background:var(--bg); color:var(--gold-light);}
  .admin-row{border:1px solid var(--line); padding:22px 24px; margin-bottom:14px; background:var(--bg-alt);}
  .admin-row h3{font-size:19px; color:var(--cream); margin-bottom:8px;}
  .admin-row .meta{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px;}
  .admin-row p{font-size:14px; color:var(--muted); line-height:1.6; margin-bottom:14px;}
  .admin-actions{display:flex; gap:10px;}
  .admin-btn{padding:9px 18px; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; border:1px solid var(--line); cursor:pointer; background:transparent; color:var(--cream);}
  .admin-btn.approve{border-color:var(--gold); color:var(--gold-light);}
  .admin-btn.approve:hover{background:rgba(198,165,90,0.1);}
  .admin-btn.reject{border-color:#c0392b; color:#e57368;}
  .admin-btn.reject:hover{background:rgba(192,57,43,0.1);}
  .login-box{max-width:380px; margin:160px auto; text-align:center;}
  .login-box input{margin-bottom:14px;}
  #logout-btn{position:fixed; top:24px; right:24px; z-index:60; font-size:12px; color:var(--muted); cursor:pointer; text-transform:uppercase; letter-spacing:0.08em;}
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:14px; margin-bottom:36px;}
  .stat-card{border:1px solid var(--line); background:var(--bg-alt); padding:20px 18px;}
  .stat-card .num{font-family:'Playfair Display',serif; font-size:34px; color:var(--gold-light);}
  .stat-card .label{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-top:4px;}
  .stat-section-title{font-size:13px; color:var(--gold); text-transform:uppercase; letter-spacing:0.1em; margin:24px 0 12px;}
</style>
</head>
<body>

<div id="login-view" class="login-box">
  <div class="logomark" style="justify-content:center; margin-bottom:30px;"><img class="nav-logo-img" src="logo-mono.png" alt="Jabran &amp; Co"></div>
  <div class="eyebrow" style="margin-bottom:20px;">Admin Login</div>
  <form id="login-form">
    <input id="login-email" type="email" placeholder="Email" required>
    <input id="login-password" type="password" placeholder="Password" required>
    <button class="btn btn-primary" type="submit" style="width:100%; border:none; cursor:pointer;">Log In</button>
    <p id="login-status" style="font-size:13px; color:#e57368; margin-top:12px;"></p>
  </form>
</div>

<div id="dashboard-view" class="admin-wrap" style="display:none;">
  <div class="eyebrow">Admin Portal</div>
  <h1 style="margin-bottom:32px;">Jabran &amp; Co Dashboard</h1>

  <div class="admin-tabs">
    <div class="admin-tab active" data-tab="overview">Overview</div>
    <div class="admin-tab" data-tab="pending">Pending Posts</div>
    <div class="admin-tab" data-tab="approved">Approved Posts</div>
    <div class="admin-tab" data-tab="contacts">Contact Submissions</div>
    <div class="admin-tab" data-tab="topic">Featured Topic</div>
    <div class="admin-tab" data-tab="clients">Clients</div>
  </div>
  <div id="tab-overview" class="admin-panel"></div>

  <div id="tab-pending" class="admin-panel" style="display:none;"></div>
  <div id="tab-approved" class="admin-panel" style="display:none;"></div>
  <div id="tab-contacts" class="admin-panel" style="display:none;"></div>
  <div id="tab-topic" class="admin-panel" style="display:none;">
    <div class="admin-row">
      <div class="meta">Publish a new topic</div>
      <h3 style="margin-bottom:16px;">Set This Week's Discussion Topic</h3>
      <form id="topic-form">
        <div style="margin-bottom:14px;">
          <label style="display:block; font-size:12px; color:var(--muted); text-transform:uppercase; margin-bottom:6px;">Title</label>
          <input id="topic-title" type="text" required style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--line); color:var(--cream); padding:8px 0; font-size:15px;">
        </div>
        <div style="margin-bottom:14px;">
          <label style="display:block; font-size:12px; color:var(--muted); text-transform:uppercase; margin-bottom:6px;">Prompt / Question</label>
          <textarea id="topic-prompt" required style="width:100%; min-height:90px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:10px; font-size:14px;"></textarea>
        </div>
        <button class="admin-btn approve" type="submit" style="cursor:pointer;">Publish as Active Topic</button>
        <p id="topic-status" style="font-size:13px; color:var(--muted); margin-top:10px;"></p>
      </form>
    </div>
    <div class="meta" style="margin-top:30px; margin-bottom:10px;">Topic History</div>
    <div id="topic-history"></div>
  </div>
  <div id="tab-clients" class="admin-panel" style="display:none;">
    <div class="admin-row">
      <div class="meta">Add a client</div>
      <h3 style="margin-bottom:16px;">New Client</h3>
      <form id="client-form">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px;">
          <div>
            <label style="display:block; font-size:12px; color:var(--muted); text-transform:uppercase; margin-bottom:6px;">Client Name</label>
            <input id="client-name" type="text" required style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--line); color:var(--cream); padding:8px 0;">
          </div>
          <div>
            <label style="display:block; font-size:12px; color:var(--muted); text-transform:uppercase; margin-bottom:6px;">Industry</label>
            <input id="client-industry" type="text" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--line); color:var(--cream); padding:8px 0;">
          </div>
          <div>
            <label style="display:block; font-size:12px; color:var(--muted); text-transform:uppercase; margin-bottom:6px;">Status</label>
            <select id="client-status" style="width:100%; background:var(--bg); border:1px solid var(--line); color:var(--cream); padding:8px;">
              <option value="active">Active</option>
              <option value="on_hold">On Hold</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div>
            <label style="display:block; font-size:12px; color:var(--muted); text-transform:uppercase; margin-bottom:6px;">Start Date</label>
            <input id="client-start" type="date" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--line); color:var(--cream); padding:8px 0;">
          </div>
        </div>
        <label style="display:block; font-size:12px; color:var(--muted); text-transform:uppercase; margin-bottom:6px;">Notes</label>
        <textarea id="client-notes" style="width:100%; min-height:60px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:10px; margin-bottom:14px;"></textarea>
        <button class="admin-btn approve" type="submit" style="cursor:pointer;">Add Client</button>
        <p id="client-status-msg" style="font-size:13px; color:var(--muted); margin-top:10px;"></p>
      </form>
    </div>
    <div class="meta" style="margin-top:30px; margin-bottom:10px;">All Clients</div>
    <div id="clients-list"></div>
  </div>
</div>

<div id="logout-btn" style="display:none;">Log Out</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
  const loginView = document.getElementById('login-view');
  const dashboardView = document.getElementById('dashboard-view');
  const logoutBtn = document.getElementById('logout-btn');

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }
  function fmtDate(d){
    return new Date(d).toLocaleString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  async function checkSession() {
    const { data } = await sb.auth.getSession();
    if (data.session) {
      showDashboard();
    } else {
      loginView.style.display = 'block';
      dashboardView.style.display = 'none';
      logoutBtn.style.display = 'none';
    }
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const statusEl = document.getElementById('login-status');
    statusEl.textContent = 'Logging in…';
    statusEl.style.color = 'var(--muted)';
    const { error } = await sb.auth.signInWithPassword({
      email: document.getElementById('login-email').value,
      password: document.getElementById('login-password').value
    });
    if (error) {
      statusEl.textContent = 'Incorrect email or password.';
      statusEl.style.color = '#e57368';
    } else {
      showDashboard();
    }
  });

  logoutBtn.addEventListener('click', async () => {
    await sb.auth.signOut();
    checkSession();
  });

  function showDashboard(){
    loginView.style.display = 'none';
    dashboardView.style.display = 'block';
    logoutBtn.style.display = 'block';
    loadPending();
    loadApproved();
    loadContacts();
    loadTopicHistory();
    loadClients();
    loadOverview();
  }

  // Tab switching
  document.querySelectorAll('.admin-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.admin-panel').forEach(p => p.style.display = 'none');
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).style.display = 'block';
    });
  });

  async function loadPending(){
    const el = document.getElementById('tab-pending');
    el.innerHTML = '<p style="color:var(--muted);">Loading…</p>';
    const { data, error } = await sb.from('blog_posts').select('*').eq('status','pending').order('created_at',{ascending:false});
    if (error) { el.innerHTML = '<p style="color:#e57368;">Error loading posts.</p>'; return; }
    if (!data.length) { el.innerHTML = '<p style="color:var(--muted);">No pending submissions.</p>'; return; }
    el.innerHTML = data.map(post => `
      <div class="admin-row">
        <div class="meta">${fmtDate(post.created_at)} · By ${escapeHtml(post.author_name)}</div>
        <h3>${escapeHtml(post.title)}</h3>
        <p>${escapeHtml(post.body)}</p>
        <div class="admin-actions">
          <button class="admin-btn approve" onclick="updateStatus('${post.id}','approved')">Approve</button>
          <button class="admin-btn reject" onclick="updateStatus('${post.id}','rejected')">Reject</button>
        </div>
      </div>
    `).join('');
  }

  async function loadApproved(){
    const el = document.getElementById('tab-approved');
    const { data, error } = await sb.from('blog_posts').select('*').eq('status','approved').order('created_at',{ascending:false});
    if (error) { el.innerHTML = '<p style="color:#e57368;">Error loading posts.</p>'; return; }
    if (!data.length) { el.innerHTML = '<p style="color:var(--muted);">No approved posts yet.</p>'; return; }
    el.innerHTML = data.map(post => `
      <div class="admin-row">
        <div class="meta">${fmtDate(post.created_at)} · By ${escapeHtml(post.author_name)} · Live on Insights</div>
        <h3>${escapeHtml(post.title)}</h3>
        <p>${escapeHtml(post.body)}</p>
        <div class="admin-actions">
          <button class="admin-btn reject" onclick="updateStatus('${post.id}','rejected')">Unpublish</button>
        </div>
      </div>
    `).join('');
  }

  async function updateStatus(id, status){
    await sb.from('blog_posts').update({ status }).eq('id', id);
    loadPending();
    loadApproved();
  }

  async function loadContacts(){
    const el = document.getElementById('tab-contacts');
    el.innerHTML = '<p style="color:var(--muted);">Loading…</p>';
    const { data, error } = await sb.from('contact_submissions').select('*').order('created_at',{ascending:false});
    if (error) { el.innerHTML = '<p style="color:#e57368;">Error loading submissions.</p>'; return; }
    if (!data.length) { el.innerHTML = '<p style="color:var(--muted);">No contact submissions yet.</p>'; return; }
    el.innerHTML = data.map(c => `
      <div class="admin-row">
        <div class="meta">${fmtDate(c.created_at)}</div>
        <h3>${escapeHtml(c.name)} — ${escapeHtml(c.email)}</h3>
        <p>${escapeHtml(c.message)}</p>
      </div>
    `).join('');
  }

  document.getElementById('topic-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const statusEl = document.getElementById('topic-status');
    statusEl.textContent = 'Publishing…';
    await sb.from('featured_topics').update({ is_active: false }).eq('is_active', true);
    const { error } = await sb.from('featured_topics').insert({
      title: document.getElementById('topic-title').value,
      prompt: document.getElementById('topic-prompt').value,
      is_active: true
    });
    if (error) {
      statusEl.textContent = 'Something went wrong.';
      statusEl.style.color = '#e57368';
    } else {
      statusEl.textContent = 'Published! This is now live on the Insights page.';
      statusEl.style.color = 'var(--gold-light)';
      document.getElementById('topic-form').reset();
      loadTopicHistory();
    }
  });

  async function loadTopicHistory(){
    const el = document.getElementById('topic-history');
    el.innerHTML = '<p style="color:var(--muted);">Loading…</p>';
    const { data, error } = await sb.from('featured_topics').select('*').order('created_at',{ascending:false});
    if (error) { el.innerHTML = '<p style="color:#e57368;">Error loading topics.</p>'; return; }
    if (!data.length) { el.innerHTML = '<p style="color:var(--muted);">No topics published yet.</p>'; return; }
    el.innerHTML = data.map(t => `
      <div class="admin-row">
        <div class="meta">${fmtDate(t.created_at)} ${t.is_active ? '· <span style="color:var(--gold-light);">ACTIVE</span>' : ''}</div>
        <h3>${escapeHtml(t.title)}</h3>
        <p>${escapeHtml(t.prompt)}</p>
        <div class="admin-actions">
          ${t.is_active
            ? `<button class="admin-btn reject" onclick="setTopicActive('${t.id}', false)">Deactivate</button>`
            : `<button class="admin-btn approve" onclick="setTopicActive('${t.id}', true)">Set Active</button>`}
        </div>
      </div>
    `).join('');
  }

  async function setTopicActive(id, active){
    if (active) {
      await sb.from('featured_topics').update({ is_active: false }).eq('is_active', true);
    }
    await sb.from('featured_topics').update({ is_active: active }).eq('id', id);
    loadTopicHistory();
  }

  async function loadOverview(){
    const el = document.getElementById('tab-overview');
    el.innerHTML = '<p style="color:var(--muted);">Loading…</p>';

    const [clientsRes, actionsRes, kpisRes, meetingsRes, reportsRes, docsRes] = await Promise.all([
      sb.from('clients').select('*'),
      sb.from('client_actions').select('*'),
      sb.from('client_kpis').select('id'),
      sb.from('client_meetings').select('*'),
      sb.from('client_reports').select('id'),
      sb.from('client_documents').select('id'),
    ]);

    const clients = clientsRes.data || [];
    const actions = actionsRes.data || [];
    const meetings = meetingsRes.data || [];
    const now = new Date();

    const activeClients = clients.filter(c => c.status === 'active').length;
    const onHoldClients = clients.filter(c => c.status === 'on_hold').length;
    const completedClients = clients.filter(c => c.status === 'completed').length;

    const overdueActions = actions.filter(a => a.due_date && new Date(a.due_date) < now && !['completed'].includes(a.status)).length;
    const completedActions = actions.filter(a => a.status === 'completed').length;
    const blockedActions = actions.filter(a => a.status === 'blocked' || a.status === 'delayed').length;

    const upcomingMeetings = meetings.filter(m => new Date(m.meeting_datetime) >= now).length;

    el.innerHTML = `
      <div class="stat-section-title">Clients</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="num">${clients.length}</div><div class="label">Total Clients</div></div>
        <div class="stat-card"><div class="num">${activeClients}</div><div class="label">Active</div></div>
        <div class="stat-card"><div class="num">${onHoldClients}</div><div class="label">On Hold</div></div>
        <div class="stat-card"><div class="num">${completedClients}</div><div class="label">Completed</div></div>
      </div>

      <div class="stat-section-title">Action Items</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="num">${actions.length}</div><div class="label">Total Tasks</div></div>
        <div class="stat-card"><div class="num" style="color:${overdueActions ? '#e57368' : 'var(--gold-light)'};">${overdueActions}</div><div class="label">Overdue</div></div>
        <div class="stat-card"><div class="num">${completedActions}</div><div class="label">Completed</div></div>
        <div class="stat-card"><div class="num">${blockedActions}</div><div class="label">Blocked / Delayed</div></div>
      </div>

      <div class="stat-section-title">Activity</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="num">${kpisRes.data ? kpisRes.data.length : 0}</div><div class="label">KPIs Logged</div></div>
        <div class="stat-card"><div class="num">${upcomingMeetings}</div><div class="label">Upcoming Meetings</div></div>
        <div class="stat-card"><div class="num">${reportsRes.data ? reportsRes.data.length : 0}</div><div class="label">Reports Generated</div></div>
        <div class="stat-card"><div class="num">${docsRes.data ? docsRes.data.length : 0}</div><div class="label">Documents Shared</div></div>
      </div>
    `;
  }

  checkSession();

  // ================= CLIENTS MODULE =================
  const STATUS_LABELS = {not_started:'Not Started', in_progress:'In Progress', under_review:'Under Review', completed:'Completed', delayed:'Delayed', blocked:'Blocked'};

  document.getElementById('client-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('client-status-msg');
    msg.textContent = 'Adding…';
    const { error } = await sb.from('clients').insert({
      name: document.getElementById('client-name').value,
      industry: document.getElementById('client-industry').value,
      status: document.getElementById('client-status').value,
      start_date: document.getElementById('client-start').value || null,
      notes: document.getElementById('client-notes').value
    });
    if (error) { msg.textContent = 'Error: ' + error.message; msg.style.color = '#e57368'; }
    else {
      msg.textContent = 'Client added.'; msg.style.color = 'var(--gold-light)';
      document.getElementById('client-form').reset();
      loadClients();
    }
  });

  async function loadClients(){
    const el = document.getElementById('clients-list');
    el.innerHTML = '<p style="color:var(--muted);">Loading…</p>';
    const { data: clients, error } = await sb.from('clients').select('*').order('created_at', {ascending:false});
    if (error) { el.innerHTML = '<p style="color:#e57368;">Error: '+error.message+'</p>'; return; }
    if (!clients.length) { el.innerHTML = '<p style="color:var(--muted);">No clients yet.</p>'; return; }

    el.innerHTML = '';
    for (const c of clients) {
      const card = document.createElement('div');
      card.className = 'admin-row';
      card.innerHTML = `
        <div class="meta">${escapeHtml(c.industry||'')} · ${c.status.replace('_',' ').toUpperCase()} ${c.start_date ? '· Since '+c.start_date : ''}</div>
        <h3>${escapeHtml(c.name)}</h3>
        <p>${escapeHtml(c.notes||'')}</p>
        <details style="margin-top:14px; border-top:1px solid var(--line); padding-top:10px;">
          <summary style="cursor:pointer; color:var(--gold-light); font-size:13px; text-transform:uppercase; letter-spacing:0.06em;">KPIs</summary>
          <div id="kpi-list-${c.id}" style="margin-top:10px;"></div>
          <form onsubmit="return addKpi(event,'${c.id}')" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;">
            <input required placeholder="Metric (e.g. OEE)" id="kpi-metric-${c.id}" style="flex:1; min-width:120px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <input required placeholder="Value" id="kpi-value-${c.id}" style="width:90px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <input placeholder="Unit" id="kpi-unit-${c.id}" style="width:70px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <input type="date" id="kpi-date-${c.id}" style="background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <button class="admin-btn approve" type="submit" style="cursor:pointer;">Add</button>
          </form>
        </details>
        <details style="margin-top:10px; border-top:1px solid var(--line); padding-top:10px;">
          <summary style="cursor:pointer; color:var(--gold-light); font-size:13px; text-transform:uppercase; letter-spacing:0.06em;">Action Items</summary>
          <div id="action-list-${c.id}" style="margin-top:10px;"></div>
          <form onsubmit="return addAction(event,'${c.id}')" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;">
            <input required placeholder="Task title" id="action-title-${c.id}" style="flex:1; min-width:140px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <select id="action-status-${c.id}" style="background:var(--bg); border:1px solid var(--line); color:var(--cream); padding:6px;">
              <option value="not_started">Not Started</option>
              <option value="in_progress">In Progress</option>
              <option value="under_review">Under Review</option>
              <option value="completed">Completed</option>
              <option value="delayed">Delayed</option>
              <option value="blocked">Blocked</option>
            </select>
            <select id="action-priority-${c.id}" style="background:var(--bg); border:1px solid var(--line); color:var(--cream); padding:6px;">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
            <input type="date" id="action-due-${c.id}" style="background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <input placeholder="Assigned to" id="action-assigned-${c.id}" style="width:120px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <button class="admin-btn approve" type="submit" style="cursor:pointer;">Add</button>
          </form>
        </details>
        <details style="margin-top:10px; border-top:1px solid var(--line); padding-top:10px;">
          <summary style="cursor:pointer; color:var(--gold-light); font-size:13px; text-transform:uppercase; letter-spacing:0.06em;">Documents</summary>
          <div id="doc-list-${c.id}" style="margin-top:10px;"></div>
          <form onsubmit="return addDocument(event,'${c.id}')" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;">
            <input required placeholder="Title" id="doc-title-${c.id}" style="flex:1; min-width:120px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <input required placeholder="Link (Google Drive, etc.)" id="doc-url-${c.id}" style="flex:2; min-width:160px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <input placeholder="Category" id="doc-category-${c.id}" style="width:110px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <button class="admin-btn approve" type="submit" style="cursor:pointer;">Add</button>
          </form>
        </details>
        <details style="margin-top:10px; border-top:1px solid var(--line); padding-top:10px;">
          <summary style="cursor:pointer; color:var(--gold-light); font-size:13px; text-transform:uppercase; letter-spacing:0.06em;">Meetings</summary>
          <div id="meeting-list-${c.id}" style="margin-top:10px;"></div>
          <form onsubmit="return addMeeting(event,'${c.id}')" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;">
            <input required placeholder="Title (e.g. Monthly Review)" id="meeting-title-${c.id}" style="flex:1; min-width:140px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <input required type="datetime-local" id="meeting-datetime-${c.id}" style="background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <input placeholder="Zoom/Meet link" id="meeting-link-${c.id}" style="flex:1; min-width:140px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <input placeholder="Notes" id="meeting-notes-${c.id}" style="flex:1; min-width:120px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <button class="admin-btn approve" type="submit" style="cursor:pointer;">Add</button>
          </form>
        </details>
        <details style="margin-top:10px; border-top:1px solid var(--line); padding-top:10px;">
          <summary style="cursor:pointer; color:var(--gold-light); font-size:13px; text-transform:uppercase; letter-spacing:0.06em;">Progress Reports</summary>
          <div id="report-list-${c.id}" style="margin-top:10px;"></div>
          <form onsubmit="return addReport(event,'${c.id}')" style="margin-top:14px; border:1px solid var(--line); padding:14px;">
            <div style="display:flex; gap:8px; margin-bottom:10px;">
              <select id="report-type-${c.id}" style="background:var(--bg); border:1px solid var(--line); color:var(--cream); padding:6px;">
                <option value="weekly">Weekly</option>
                <option value="monthly" selected>Monthly</option>
                <option value="project_end">Project-End</option>
              </select>
              <input type="date" id="report-date-${c.id}" style="background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            </div>
            <textarea placeholder="Baseline summary" id="report-baseline-${c.id}" style="width:100%; min-height:50px; margin-bottom:8px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:8px; font-size:13px;"></textarea>
            <textarea placeholder="Current performance" id="report-current-${c.id}" style="width:100%; min-height:50px; margin-bottom:8px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:8px; font-size:13px;"></textarea>
            <textarea placeholder="Improvements achieved" id="report-improvements-${c.id}" style="width:100%; min-height:50px; margin-bottom:8px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:8px; font-size:13px;"></textarea>
            <textarea placeholder="Financial savings" id="report-savings-${c.id}" style="width:100%; min-height:40px; margin-bottom:8px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:8px; font-size:13px;"></textarea>
            <textarea placeholder="Risks" id="report-risks-${c.id}" style="width:100%; min-height:40px; margin-bottom:8px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:8px; font-size:13px;"></textarea>
            <textarea placeholder="Next steps" id="report-next-${c.id}" style="width:100%; min-height:40px; margin-bottom:8px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:8px; font-size:13px;"></textarea>
            <textarea placeholder="Consultant recommendations" id="report-recommendations-${c.id}" style="width:100%; min-height:40px; margin-bottom:10px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:8px; font-size:13px;"></textarea>
            <button class="admin-btn approve" type="submit" style="cursor:pointer;">Generate Report</button>
          </form>
        </details>
        <details style="margin-top:10px; border-top:1px solid var(--line); padding-top:10px;">
          <summary style="cursor:pointer; color:var(--gold-light); font-size:13px; text-transform:uppercase; letter-spacing:0.06em;">Client Login</summary>
          <div id="login-status-${c.id}" style="margin:10px 0; font-size:13px; color:var(--muted);">Checking…</div>
          <form onsubmit="return linkLogin(event,'${c.id}','${escapeHtml(c.name)}')" style="display:flex; gap:8px; flex-wrap:wrap;">
            <input placeholder="Paste Supabase Auth User UID" id="login-uid-${c.id}" style="flex:1; min-width:200px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <input placeholder="Client email" id="login-email-${c.id}" type="email" style="flex:1; min-width:180px; background:transparent; border:1px solid var(--line); color:var(--cream); padding:6px 8px;">
            <button class="admin-btn approve" type="submit" style="cursor:pointer;">Link Login</button>
          </form>
        </details>
      `;
      el.appendChild(card);
      loadKpis(c.id);
      loadActions(c.id);
      loadDocuments(c.id);
      loadMeetings(c.id);
      loadReports(c.id);
      loadLoginStatus(c.id, c.name);
    }
  }

  async function loadKpis(clientId){
    const { data } = await sb.from('client_kpis').select('*').eq('client_id', clientId).order('recorded_at', {ascending:false});
    const el = document.getElementById('kpi-list-'+clientId);
    if (!el) return;
    el.innerHTML = (data && data.length) ? data.map(k => `
      <div style="font-size:13px; color:var(--cream); padding:4px 0; border-bottom:1px solid var(--line);">
        <strong>${escapeHtml(k.metric_name)}</strong>: ${escapeHtml(k.value)} ${escapeHtml(k.unit||'')} <span style="color:var(--muted);">— ${k.recorded_at}</span>
      </div>`).join('') : '<p style="color:var(--muted); font-size:13px;">No KPIs recorded yet.</p>';
  }

  async function addKpi(e, clientId){
    e.preventDefault();
    await sb.from('client_kpis').insert({
      client_id: clientId,
      metric_name: document.getElementById('kpi-metric-'+clientId).value,
      value: document.getElementById('kpi-value-'+clientId).value,
      unit: document.getElementById('kpi-unit-'+clientId).value,
      recorded_at: document.getElementById('kpi-date-'+clientId).value || new Date().toISOString().slice(0,10)
    });
    loadKpis(clientId);
    e.target.reset();
    return false;
  }

  async function loadActions(clientId){
    const { data } = await sb.from('client_actions').select('*').eq('client_id', clientId).order('created_at', {ascending:false});
    const el = document.getElementById('action-list-'+clientId);
    if (!el) return;
    el.innerHTML = (data && data.length) ? data.map(a => `
      <div style="font-size:13px; color:var(--cream); padding:6px 0; border-bottom:1px solid var(--line);">
        <strong>${escapeHtml(a.title)}</strong> — <span style="color:var(--gold-light);">${STATUS_LABELS[a.status]}</span>
        <span style="color:var(--muted);">· ${a.priority} priority ${a.due_date ? '· due '+a.due_date : ''} ${a.assigned_to ? '· '+escapeHtml(a.assigned_to) : ''}</span>
      </div>`).join('') : '<p style="color:var(--muted); font-size:13px;">No action items yet.</p>';
  }

  async function addAction(e, clientId){
    e.preventDefault();
    await sb.from('client_actions').insert({
      client_id: clientId,
      title: document.getElementById('action-title-'+clientId).value,
      status: document.getElementById('action-status-'+clientId).value,
      priority: document.getElementById('action-priority-'+clientId).value,
      due_date: document.getElementById('action-due-'+clientId).value || null,
      assigned_to: document.getElementById('action-assigned-'+clientId).value
    });
    loadActions(clientId);
    e.target.reset();
    return false;
  }

  async function loadDocuments(clientId){
    const { data } = await sb.from('client_documents').select('*').eq('client_id', clientId).order('created_at', {ascending:false});
    const el = document.getElementById('doc-list-'+clientId);
    if (!el) return;
    el.innerHTML = (data && data.length) ? data.map(d => `
      <div style="font-size:13px; padding:4px 0; border-bottom:1px solid var(--line);">
        <a href="${escapeHtml(d.url)}" target="_blank" rel="noopener" style="color:var(--gold-light);">${escapeHtml(d.title)}</a>
        <span style="color:var(--muted);"> ${d.category ? '· '+escapeHtml(d.category) : ''}</span>
      </div>`).join('') : '<p style="color:var(--muted); font-size:13px;">No documents linked yet.</p>';
  }

  async function addDocument(e, clientId){
    e.preventDefault();
    await sb.from('client_documents').insert({
      client_id: clientId,
      title: document.getElementById('doc-title-'+clientId).value,
      url: document.getElementById('doc-url-'+clientId).value,
      category: document.getElementById('doc-category-'+clientId).value
    });
    loadDocuments(clientId);
    e.target.reset();
    return false;
  }

  async function loadMeetings(clientId){
    const { data } = await sb.from('client_meetings').select('*').eq('client_id', clientId).order('meeting_datetime', {ascending:true});
    const el = document.getElementById('meeting-list-'+clientId);
    if (!el) return;
    if (!data || !data.length) { el.innerHTML = '<p style="color:var(--muted); font-size:13px;">No meetings scheduled yet.</p>'; return; }
    const now = new Date();
    el.innerHTML = data.map(m => {
      const dt = new Date(m.meeting_datetime);
      const isPast = dt < now;
      return `
      <div style="font-size:13px; color:var(--cream); padding:6px 0; border-bottom:1px solid var(--line); ${isPast ? 'opacity:0.5;' : ''}">
        <strong>${escapeHtml(m.title)}</strong> ${isPast ? '<span style="color:var(--muted);">(past)</span>' : ''}<br>
        <span style="color:var(--muted);">${dt.toLocaleString('en-GB', {dateStyle:'medium', timeStyle:'short'})}</span>
        ${m.meeting_link ? ' · <a href="'+escapeHtml(m.meeting_link)+'" target="_blank" rel="noopener" style="color:var(--gold-light);">Join Link</a>' : ''}
        ${m.notes ? '<br><span style="color:var(--muted);">'+escapeHtml(m.notes)+'</span>' : ''}
      </div>`;
    }).join('');
  }

  async function addMeeting(e, clientId){
    e.preventDefault();
    await sb.from('client_meetings').insert({
      client_id: clientId,
      title: document.getElementById('meeting-title-'+clientId).value,
      meeting_datetime: document.getElementById('meeting-datetime-'+clientId).value,
      meeting_link: document.getElementById('meeting-link-'+clientId).value,
      notes: document.getElementById('meeting-notes-'+clientId).value
    });
    loadMeetings(clientId);
    e.target.reset();
    return false;
  }

  async function loadReports(clientId){
    const { data } = await sb.from('client_reports').select('*').eq('client_id', clientId).order('report_date', {ascending:false});
    const el = document.getElementById('report-list-'+clientId);
    if (!el) return;
    if (!data || !data.length) { el.innerHTML = '<p style="color:var(--muted); font-size:13px;">No reports generated yet.</p>'; return; }
    el.innerHTML = data.map(r => `
      <div style="font-size:13px; padding:6px 0; border-bottom:1px solid var(--line);">
        ${r.report_type.replace('_',' ').toUpperCase()} · ${r.report_date}
        &nbsp;·&nbsp; <a href="report-view.html?id=${r.id}" target="_blank" style="color:var(--gold-light);">View / Print</a>
      </div>
    `).join('');
  }

  async function addReport(e, clientId){
    e.preventDefault();
    const { error } = await sb.from('client_reports').insert({
      client_id: clientId,
      report_type: document.getElementById('report-type-'+clientId).value,
      report_date: document.getElementById('report-date-'+clientId).value || new Date().toISOString().slice(0,10),
      baseline_summary: document.getElementById('report-baseline-'+clientId).value,
      current_performance: document.getElementById('report-current-'+clientId).value,
      improvements_achieved: document.getElementById('report-improvements-'+clientId).value,
      financial_savings: document.getElementById('report-savings-'+clientId).value,
      risks: document.getElementById('report-risks-'+clientId).value,
      next_steps: document.getElementById('report-next-'+clientId).value,
      recommendations: document.getElementById('report-recommendations-'+clientId).value
    });
    if (!error) { loadReports(clientId); e.target.reset(); }
    return false;
  }

  async function loadLoginStatus(clientId, clientName){
    const { data } = await sb.from('profiles').select('*').eq('client_id', clientId).eq('role','client');
    const el = document.getElementById('login-status-'+clientId);
    if (!el) return;
    if (data && data.length && data[0].email) {
      const email = data[0].email;
      const subject = encodeURIComponent(`Update on your Jabran & Co project — ${clientName}`);
      const body = encodeURIComponent(`Hello,\n\nThere's a new update on your project dashboard. Please log in to review it:\n\nhttps://www.jabranandco.com/client-portal.html\n\nBest,\nJabran & Co`);
      el.innerHTML = `Linked to login: ${escapeHtml(email)} &nbsp; <a href="mailto:${email}?subject=${subject}&body=${body}" style="color:var(--gold-light); text-decoration:underline;">Notify Client</a>`;
    } else {
      el.textContent = 'No login linked yet.';
    }
  }

  async function linkLogin(e, clientId, clientName){
    e.preventDefault();
    const uid = document.getElementById('login-uid-'+clientId).value.trim();
    const email = document.getElementById('login-email-'+clientId).value.trim();
    if (!uid) return false;
    const { error } = await sb.from('profiles').upsert({ id: uid, role: 'client', client_id: clientId, email: email || null });
    const statusEl = document.getElementById('login-status-'+clientId);
    if (error) { statusEl.textContent = 'Error: '+error.message; }
    else { loadLoginStatus(clientId, clientName); }
    return false;
  }
</script>
</body>
</html>
