<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate — Jabran & Co</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0B0F14; --gold:#C6A55A; --gold-light:#E4C98A; --cream:#F5F3EF; --muted:#9C9690; --line:rgba(198,165,90,0.35); }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Inter',sans-serif; background:var(--bg); color:var(--cream); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:32px;}
  .cert{
    max-width:820px; width:100%; border:2px solid var(--gold); padding:60px 50px; text-align:center;
    background:linear-gradient(180deg, rgba(198,165,90,0.04), transparent);
  }
  .cert-inner-border{border:1px solid var(--line); padding:40px 30px;}
  .logo{font-family:'Playfair Display',serif; font-size:32px; color:var(--gold-light); margin-bottom:6px;}
  .logo-sub{font-size:11px; letter-spacing:0.24em; color:var(--muted); margin-bottom:40px;}
  .eyebrow{font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); margin-bottom:18px;}
  .cert-title{font-family:'Playfair Display',serif; font-size:38px; color:var(--cream); margin-bottom:30px;}
  .presented{font-size:14px; color:var(--muted); margin-bottom:6px;}
  .recipient{font-family:'Playfair Display',serif; font-style:italic; font-size:32px; color:var(--gold-light); margin-bottom:30px; border-bottom:1px solid var(--line); display:inline-block; padding-bottom:10px;}
  .for-text{font-size:15px; color:var(--muted); margin-bottom:6px;}
  .module-title{font-family:'Playfair Display',serif; font-size:24px; color:var(--cream); margin-bottom:40px;}
  .signature-row{display:flex; justify-content:space-between; margin-top:50px; font-size:13px; color:var(--muted);}
  .signature-block{text-align:center;}
  .signature-name{font-family:'Playfair Display',serif; font-style:italic; font-size:18px; color:var(--cream); border-bottom:1px solid var(--line); padding-bottom:6px; margin-bottom:6px;}
  .cert-code{margin-top:40px; font-size:11px; color:var(--muted); letter-spacing:0.05em;}
  .print-btn{
    position:fixed; top:24px; right:24px; background:var(--gold); color:#0a0a0b; border:none;
    padding:12px 22px; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; border-radius:2px;
  }
  @media print{
    body{background:#fff; color:#111; min-height:auto;}
    .print-btn{display:none;}
    .cert{border-color:#C6A55A;}
    .logo{color:#8a6b1e;}
    .cert-title, .module-title, .signature-name{color:#111;}
    .recipient{color:#8a6b1e;}
    .presented, .for-text, .logo-sub, .signature-row, .cert-code{color:#555;}
  }
  .sig-img{height:50px; display:block; margin:0 auto;}
  .estamp-img{width:130px; margin:30px auto 0; display:block; opacity:0.92;}

  @media print{
    .sig-light{display:none !important;}
    .sig-dark{display:block !important;}
    .estamp-light{display:none !important;}
    .estamp-dark{display:block !important;}
  }
</style>
</head>
<body>

<button class="print-btn" onclick="window.print()">Print / Save as PDF</button>

<div class="cert">
  <div class="cert-inner-border">
    <img src="logo-full.png" alt="Jabran &amp; Co" style="height:70px; margin-bottom:30px;">

    <div class="eyebrow">Certificate of Completion</div>
    <div class="cert-title">Training Academy</div>

    <div class="presented">This certifies that</div>
    <div class="recipient" id="recipient-name">Loading…</div>

    <div class="for-text">has successfully completed the training module</div>
    <div class="module-title" id="module-title">—</div>

    <div class="signature-row">
      <div class="signature-block">
        <img src="signature-light.png" class="sig-img sig-light" alt="Signature">
        <img src="signature-dark.png" class="sig-img sig-dark" alt="Signature" style="display:none;">
        <div class="signature-name" style="border-bottom:1px solid var(--line); padding-bottom:6px; margin-top:8px;">Syed Jabran Ali Kamran</div>
        Chief Executive Officer
      </div>
      <div class="signature-block">
        <div class="signature-name" id="issue-date">—</div>
        Date Issued
      </div>
    </div>

    <div class="cert-code" id="cert-code">Certificate ID: —</div>

    <img src="estamp-gold.png" class="estamp-img estamp-light" alt="Official Seal">
    <img src="estamp-print.png" class="estamp-img estamp-dark" alt="Official Seal" style="display:none;">
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
  async function loadCertificate(){
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (!code) { document.getElementById('recipient-name').textContent = 'Certificate not found'; return; }

    const { data: session } = await sb.auth.getSession();
    if (!session.session) {
      document.getElementById('recipient-name').textContent = 'Please log in to view this certificate';
      return;
    }

    const { data: cert, error } = await sb.from('training_certificates')
      .select('*, clients(name), training_modules(title)')
      .eq('certificate_code', code)
      .single();

    if (error || !cert) {
      document.getElementById('recipient-name').textContent = 'Certificate not found or access denied';
      return;
    }

    document.getElementById('recipient-name').textContent = cert.clients.name;
    document.getElementById('module-title').textContent = cert.training_modules.title;
    document.getElementById('issue-date').textContent = new Date(cert.issued_at).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    document.getElementById('cert-code').textContent = 'Certificate ID: ' + cert.certificate_code;
  }
  loadCertificate();
</script>
</body>
</html>
